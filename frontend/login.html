<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In | Department AI</title>
    <link rel="stylesheet" href="/frontend/css/styles.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <div class="login-card-container">
        <div class="login-branding">
          <img src="/frontend/assets/college_logo.png" alt="RGMCET Shield" class="login-institution-logo" id="college-logo" />
          
          <h1 class="login-h1">RGM College of Engineering <span class="login-title-secondary">and Technology</span></h1>
          <h2 class="login-h2">Department of CSE AI & ML</h2>
        </div>
        
        <div class="login-divider"></div>
        
        <form id="login-form">
        <div class="login-input-group">
          <label class="login-label">Student or Faculty Email</label>
          <input
            id="email"
            type="email"
            class="login-field"
            placeholder="e.g. 23091A33xx@rgmcet.edu.in"
            required
            autocomplete="email"
          />
        </div>
        <div class="login-input-group">
          <label class="login-label">Password</label>
          <input
            id="password"
            type="password"
            class="login-field"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
        <button type="submit" class="login-submit-btn">
          <span class="btn-text">Sign In</span>
          <span class="btn-arrow">→</span>
          <span class="btn-spinner" style="display: none;">⟳</span>
        </button>
      </form>
      
      <div id="auth-status" class="auth-status-badge" style="display: none;"></div>
      
      <div class="login-footer">
        RGMCET Department of CSE AI & ML
      </div>
      </div>
    </main>

    <script type="module" src="/frontend/js/login.js"></script>
  </body>
</html>
