<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Department AI | Assistant</title>
  <link rel="stylesheet" href="/frontend/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand-section">
        <img src="/frontend/assets/department_logo.png" alt="Dept Logo" class="sidebar-logo logo">
        <div class="brand-text-stack">
          <span class="brand-main">Department AI</span>
          <span class="brand-sub">CSE AI & ML RGMCET</span>
        </div>
      </div>

      <button class="new-chat-btn-gpt" id="new-chat-button">
        <span>New chat</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
      </button>

      <div class="sidebar-search-container">
        <svg class="sidebar-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="sidebar-search-input" placeholder="Search chats">
      </div>

      <div class="sidebar-scroll-area">
        <a class="sidebar-nav-item" href="/documents">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          <span>Documents Hub</span>
        </a>
        
        <div class="sidebar-nav-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          <span>Department RAG</span>
        </div>

        <div class="sidebar-section-label">Recents</div>
        <div id="history-list">
          <!-- Dynamically populated -->
        </div>
      </div>

      <div class="sidebar-user-footer">
        <div class="user-capsule" id="user-profile-row">
          <div class="user-avatar-initial" id="user-initials" style="background-color: var(--role-student);">U</div>
          <div class="user-meta">
            <span class="user-full-name user-name-skeleton" id="user-display-name"></span>
            <span class="user-role-pill" id="user-role-badge">Student</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main View -->
    <main class="main-view">
      <header class="app-header" id="main-header">
        <div class="header-center-identity">RGMCET DEPARTMENT AI</div>
      </header>

      <section class="chat-viewport" id="conversation-feed">
        <div class="chat-thread-container" id="chat-thread">
          
          <div id="welcome-screen" class="empty-state-hero" style="display: none;">
            <div class="logo-container">
              <img src="/frontend/assets/department_logo.png" alt="Logo" class="hero-brain-logo logo">
            </div>
            <h1 class="hero-greeting" id="dynamic-greeting">What's on the agenda today?</h1>
            <div id="starter-grid" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; max-width: 500px;"></div>
          </div>
          
          <!-- Messages populated here -->
          
        </div>
      </section>

      <!-- Composer Wrapper (Floating State by default) -->
      <section class="composer-wrapper floating" id="composer-area">
        <div class="composer-bar">
          <form id="chat-form" class="composer-input-row">
            <textarea id="question" rows="1" placeholder="Message Department AI..." autocomplete="off"></textarea>
            <button type="submit" id="send-button" class="composer-send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
            </button>
          </form>
          <div class="composer-disclaimer">
            Department AI can make mistakes. Check important academic info.
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- User Menu Overlay -->
  <div id="user-menu" style="display:none; position:absolute; bottom:70px; left:12px; width:240px; background:var(--bg-composer); border:1px solid var(--border-subtle); border-radius:12px; padding:6px; z-index:100; box-shadow:0 10px 15px -3px rgba(0,0,0,0.5);">
    <a href="/profile" class="sidebar-nav-item">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      <span>Settings</span>
    </a>
    <button id="logout-button" class="sidebar-nav-item" style="width:100%; border:none; background:transparent; color:#ef4444;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
      <span>Log Out</span>
    </button>
  </div>

  <script type="module" src="/frontend/js/dashboard.js"></script>
</body>
</html>
