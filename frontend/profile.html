<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Settings | Department AI</title>
  <link rel="stylesheet" href="/frontend/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand-section">
          <img src="/frontend/assets/department_logo.png" alt="Dept Logo" class="sidebar-logo logo">
          <div class="brand-text-stack">
            <span class="brand-main">Department AI</span>
            <span class="brand-sub">CSE AI & ML RGMCET</span>
          </div>
        </div>
  
        <a href="/dashboard" class="sidebar-nav-item">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Back to Chat</span>
        </a>
  
        <div class="sidebar-scroll-area">
          <a href="/documents" class="sidebar-nav-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
            <span>Documents Hub</span>
          </a>
          <div class="sidebar-nav-item active">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
              <span>Settings</span>
          </div>
        </div>
    </aside>

    <!-- Main View -->
    <main class="main-view" style="overflow-y: auto;">
      <div style="max-width: 600px; margin: 48px auto; padding: 0 24px;">
        <h1 style="font-size: 20px; font-weight: 600; margin-bottom: 32px;">Settings</h1>
        
        <div style="background: var(--bg-sidebar); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; margin-bottom: 24px;">
            <h2 style="font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 20px; letter-spacing: 0.05em;">Personal Profile</h2>
            
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-size: 14px; font-weight: 500;">Full Name</div>
                        <div id="p-name" style="font-size: 14px; color: var(--text-secondary);">Loading...</div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-subtle); padding-top: 16px;">
                    <div>
                        <div style="font-size: 14px; font-weight: 500;">Institutional Email</div>
                        <div id="p-email" style="font-size: 14px; color: var(--text-secondary);">Loading...</div>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-subtle); padding-top: 16px;">
                    <div>
                        <div style="font-size: 14px; font-weight: 500;">Registration Index</div>
                        <div id="p-reg" style="font-size: 14px; color: var(--text-secondary);">-</div>
                    </div>
                </div>
            </div>
        </div>

        <div style="background: var(--bg-sidebar); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 24px; margin-bottom: 32px;">
            <h2 style="font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 20px; letter-spacing: 0.05em;">Academic Status</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; text-align: center;">
                <div>
                   <div id="p-cgpa" style="font-size: 24px; font-weight: 700; color: var(--accent-green);">0.00</div>
                   <div style="font-size: 10px; text-transform: uppercase; color: var(--text-secondary); margin-top: 4px;">Current CGPA</div>
                </div>
                <div>
                   <div id="p-backlogs" style="font-size: 24px; font-weight: 700; color: #ef4444;">0</div>
                   <div style="font-size: 10px; text-transform: uppercase; color: var(--text-secondary); margin-top: 4px;">Backlogs</div>
                </div>
                <div>
                   <div id="p-placement" style="font-size: 16px; font-weight: 600; color: var(--text-main); margin-top: 8px;">-</div>
                   <div style="font-size: 10px; text-transform: uppercase; color: var(--text-secondary); margin-top: 4px;">Placement</div>
                </div>
            </div>
        </div>

        <button id="logout-button-alt" class="login-submit-btn" style="background: transparent; color: #ef4444; border: 1px solid #ef4444; margin-top: 0;">Sign out of session</button>
      </div>
    </main>
  </div>

  <script type="module" src="/frontend/js/profile.js"></script>
</body>
</html>
